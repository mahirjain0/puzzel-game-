<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Logic - Brain Training</title>
    <link rel="stylesheet" href="style-mirage.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="game-page">
        <header class="game-header">
            <a href="index.html" class="back-link">← Back to Portal</a>
            <h1>Pattern Logic</h1>
            <div class="level-selector">
                <button class="level-btn active" data-level="easy">Easy</button>
                <button class="level-btn" data-level="medium">Medium</button>
                <button class="level-btn" data-level="hard">Hard</button>
            </div>
        </header>
        
        <main class="game-main">
            <div class="game-stats">
                <div class="stat">Moves: <span id="pattern-moves">0</span></div>
                <div class="stat">Time: <span id="pattern-time">00:00</span></div>
                <div class="stat">Level: <span id="pattern-level">Easy</span></div>
            </div>
            
            <div id="pattern-grid" class="pattern-grid">
                <!-- Tiles generated by JS -->
            </div>
            
            <div class="game-controls">
                <button id="pattern-shuffle" class="glass-btn">Shuffle</button>
                <button id="pattern-solve" class="glass-btn">Solve</button>
                <button id="pattern-reset" class="glass-btn">Reset</button>
            </div>
        </main>
    </div>
    
    <div id="notification-container" class="notification-container"></div>
    
    <script src="config.js"></script>
    <script src="pattern.js"></script>
</body>
</html>
