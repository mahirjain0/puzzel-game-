<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Matrix - Brain Training</title>
    <link rel="stylesheet" href="style-mirage.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="game-page">
        <header class="game-header">
            <a href="index.html" class="back-link">← Back to Portal</a>
            <h1>Memory Matrix</h1>
        </header>
        
        <main class="game-main">
            <div class="game-stats">
                <div class="stat">Pairs: <span id="matrix-pairs">0/8</span></div>
                <div class="stat">Moves: <span id="matrix-moves">0</span></div>
                <div class="stat">Score: <span id="matrix-score">0</span></div>
            </div>
            
            <div id="matrix-grid" class="matrix-grid">
                <!-- Cards generated by JS -->
            </div>
            
            <div class="game-controls">
                <button id="matrix-new" class="glass-btn">New Game</button>
                <button id="matrix-hint" class="glass-btn">Hint</button>
            </div>
        </main>
    </div>
    
    <div id="notification-container" class="notification-container"></div>
    
    <script src="config.js"></script>
    <script src="matrix.js"></script>
</body>
</html>
