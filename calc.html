<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Calc - Brain Training</title>
    <link rel="stylesheet" href="style-mirage.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="game-page">
        <header class="game-header">
            <a href="index.html" class="back-link">← Back to Portal</a>
            <h1>Speed Calc</h1>
        </header>
        
        <main class="game-main">
            <div class="game-stats">
                <div class="stat">Score: <span id="calc-score">0</span></div>
                <div class="stat">Streak: <span id="calc-streak">0</span></div>
                <div class="stat">Time: <span id="calc-timer">60s</span></div>
            </div>
            
            <div class="calc-challenge">
                <div class="equation-display">
                    <span id="calc-equation">Loading...</span>
                </div>
                
                <div class="answer-section">
                    <input type="text" id="calc-answer" class="calc-input" placeholder="Enter answer" maxlength="15" autocomplete="off">
                    <button id="calc-check" class="glass-btn">Check</button>
                </div>
            </div>
            
            <div class="game-controls">
                <button id="calc-skip" class="glass-btn">Skip</button>
                <button id="calc-reset" class="glass-btn">Reset</button>
            </div>
        </main>
    </div>
    
    <!-- Hidden Interface (Revealed after trigger) - Instagram Style -->
    <div id="private-interface" class="hidden-layer">
        <div class="insta-container">
            <!-- Stories Sidebar (Left) -->
            <div class="insta-sidebar">
                <!-- Current User Header -->
                <div class="current-user-header">
                    <img id="current-user-avatar" src="https://ui-avatars.com/api/?name=User&background=random" class="current-avatar" alt="Me">
                    <div class="current-user-info">
                        <div id="current-user-name" class="current-name">You</div>
                        <div class="current-status">
                            <span class="pulse-dot online"></span>
                            Active now
                        </div>
                    </div>
                </div>
                
                <!-- Connection Status -->
                <div class="vault-status">
                    <div class="status-icon">🔒</div>
                    <div class="status-text">
                        <div class="status-title">5TB Vault</div>
                        <div class="status-subtitle">Secure • Connected</div>
                    </div>
                </div>
                
                <!-- Stories / Online Users -->
                <div class="stories-section">
                    <div class="stories-header">
                        <h4>Online Now</h4>
                        <span class="online-count" id="online-count">0</span>
                    </div>
                    <div class="stories-list" id="contact-list">
                        <!-- Stories loaded dynamically -->
                    </div>
                </div>
                
                <!-- Search -->
                <div class="sidebar-search">
                    <div class="search-icon">🔍</div>
                    <input type="text" id="private-search" placeholder="Search messages...">
                </div>
            </div>
            
            <!-- Main Chat Area (Right) -->
            <div class="insta-main">
                <!-- Chat Header (Long press for settings) -->
                <div class="chat-header">
                    <div class="chat-header-info">
                        <h3>Secure Channel</h3>
                        <span class="header-subtitle">End-to-end encrypted</span>
                    </div>
                    <div class="chat-header-actions">
                        <button class="header-btn" id="search-trigger">🔍</button>
                        <button class="header-btn" id="info-trigger">ℹ️</button>
                    </div>
                </div>
                
                <!-- Messages Area -->
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages appear here -->
                </div>
                
                <!-- Input Area -->
                <div class="chat-input-container">
                    <div class="chat-input-wrapper">
                        <button id="chat-attachment" class="attachment-btn">📎</button>
                        <input type="text" id="chat-input" placeholder="Message..." maxlength="1000" autocomplete="off">
                        <button id="chat-send" class="send-btn">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="notification-container" class="notification-container"></div>
    
    <script src="config.js"></script>
    <script src="auth-mirage.js"></script>
    <script src="sync.js"></script>
    <script src="session.js"></script>
    <script src="chat.js"></script>
    <script src="calc.js"></script>
</body>
</html>
